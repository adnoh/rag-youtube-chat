name: benchmark-evaluator
description: |
  Use when: Scoring a benchmark PR against 7 dimensions on a 1-10 scale.
  Does: Fetches PR + linked issue + diff. Runs Opus once with structured
        output. Writes evaluation.json. Posts a formatted comment on the PR
        with the scoreboard and verdict.
  Argument: PR number (e.g. `benchmark-evaluator "#42"`).

# Opus for judgment — this is where you want the strongest critic.
provider: claude
model: opus

nodes:
  - id: fetch-pr
    bash: |
      set -euo pipefail
      PR_NUMBER=$(echo "$ARGUMENTS" | grep -oE '[0-9]+' | head -1)
      if [ -z "$PR_NUMBER" ]; then
        echo "ERROR: No PR number in arguments: $ARGUMENTS" >&2
        exit 1
      fi
      echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
      gh pr view "$PR_NUMBER" --json number,title,body,headRefName,additions,deletions,changedFiles,labels,author
    timeout: 20000

  - id: fetch-diff
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      gh pr diff "$PR_NUMBER" | head -3000
    depends_on: [fetch-pr]
    timeout: 30000

  - id: fetch-issue
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json body -q '.body' \
        | grep -oiE '(fixes|closes|resolves) #[0-9]+' \
        | grep -oE '[0-9]+' | head -1)
      if [ -n "$ISSUE_NUM" ]; then
        gh issue view "$ISSUE_NUM" --json number,title,body
      else
        echo '{"error":"No linked issue found in PR body."}'
      fi
    depends_on: [fetch-pr]
    timeout: 20000

  - id: fetch-commit-log
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      # Get the head ref + base ref, then show the commits
      HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName -q '.headRefName')
      BASE_REF=$(gh pr view "$PR_NUMBER" --json baseRefName -q '.baseRefName')
      git fetch origin "$HEAD_REF" "$BASE_REF" 2>/dev/null || true
      git log --oneline --no-merges "origin/${BASE_REF}..origin/${HEAD_REF}" 2>/dev/null | head -20
    depends_on: [fetch-pr]
    timeout: 20000

  - id: evaluate
    prompt: |
      You are Cole's second brain, scoring a benchmark PR. This PR was produced
      by an experimental workflow that varies which model handles planning vs
      implementation. Your job is to score the PR on 7 dimensions so we can
      compare cells objectively.

      ## Original Issue
      $fetch-issue.output

      ## PR Metadata
      $fetch-pr.output

      ## PR Diff
      $fetch-diff.output

      ## Commit Log (shows split between impl + self-review)
      $fetch-commit-log.output

      ## Instructions

      Score each of the 7 dimensions on a 1-10 scale with a 1-2 sentence rationale.
      Be honest — if the PR is bad, score it low and say why. If it's excellent,
      score it high and say why. Use the full range; don't cluster around 6-7.

      ### Dimensions

      1. **solves_issue** — Does the fix actually address what the issue asked for?
         10 = exactly solves the stated problem. 1 = doesn't solve it at all.
      2. **root_cause** — Structurally sound fix, or band-aid that papers over
         the symptom? 10 = true root cause. 1 = pure bandaid.
      3. **scope_discipline** — Touched only what was needed?
         10 = surgical, only relevant files. 1 = sprawling, lots of unrelated changes.
      4. **subtle_correctness** — Edge cases, async/await, types, no foot-guns
         introduced. 10 = thoughtful about subtle failure modes. 1 = obvious bugs.
      5. **code_quality** — Readable, well-named, idiomatic to this codebase.
         10 = production-grade. 1 = sloppy.
      6. **test_discipline** — Meaningful tests added for the change, or existing
         tests gamed? 10 = good targeted tests. 1 = no tests / tests modified to pass.
      7. **plan_impl_fidelity** — Does the implementation match what the plan
         commit history suggests was planned? If you can't tell from the commits,
         score 5 and note "not visible".

      ### Write your output to TWO places:

      1. The structured JSON (Archon collects this via output_format).
      2. A pretty-printed copy at `$ARTIFACTS_DIR/evaluation.json` — same
         structure as the output_format, for the next node to read without
         worrying about Archon's substitution quoting.

      Use the Write tool to create `$ARTIFACTS_DIR/evaluation.json` with this exact shape:

      ```json
      {
        "scores": {
          "solves_issue":       { "score": N, "rationale": "..." },
          "root_cause":         { "score": N, "rationale": "..." },
          "scope_discipline":   { "score": N, "rationale": "..." },
          "subtle_correctness": { "score": N, "rationale": "..." },
          "code_quality":       { "score": N, "rationale": "..." },
          "test_discipline":    { "score": N, "rationale": "..." },
          "plan_impl_fidelity": { "score": N, "rationale": "..." }
        },
        "total": N,
        "verdict": "1-2 paragraph summary of strengths and weaknesses."
      }
      ```

      `total` is the sum of the 7 dimension scores (out of 70).
    depends_on: [fetch-issue, fetch-diff, fetch-commit-log]
    context: fresh
    output_format:
      type: object
      properties:
        scores:
          type: object
          properties:
            solves_issue:
              type: object
              properties:
                score: { type: number }
                rationale: { type: string }
              required: [score, rationale]
            root_cause:
              type: object
              properties:
                score: { type: number }
                rationale: { type: string }
              required: [score, rationale]
            scope_discipline:
              type: object
              properties:
                score: { type: number }
                rationale: { type: string }
              required: [score, rationale]
            subtle_correctness:
              type: object
              properties:
                score: { type: number }
                rationale: { type: string }
              required: [score, rationale]
            code_quality:
              type: object
              properties:
                score: { type: number }
                rationale: { type: string }
              required: [score, rationale]
            test_discipline:
              type: object
              properties:
                score: { type: number }
                rationale: { type: string }
              required: [score, rationale]
            plan_impl_fidelity:
              type: object
              properties:
                score: { type: number }
                rationale: { type: string }
              required: [score, rationale]
          required:
            - solves_issue
            - root_cause
            - scope_discipline
            - subtle_correctness
            - code_quality
            - test_discipline
            - plan_impl_fidelity
        total:
          type: number
        verdict:
          type: string
      required: [scores, total, verdict]

  - id: post-eval-comment
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      EVAL_FILE="$ARTIFACTS_DIR/evaluation.json"

      if [ ! -f "$EVAL_FILE" ]; then
        echo "ERROR: evaluation.json not found at $EVAL_FILE" >&2
        exit 1
      fi

      TOTAL=$(jq -r '.total' "$EVAL_FILE")
      VERDICT=$(jq -r '.verdict' "$EVAL_FILE")

      # Build markdown table from scores
      TABLE=$(jq -r '
        .scores | to_entries[]
        | "| \(.key) | \(.value.score)/10 | \(.value.rationale) |"
      ' "$EVAL_FILE")

      # Compose the comment
      COMMENT=$(cat <<EOF
      **Benchmark Evaluator** — score: **${TOTAL}/70**

      ${VERDICT}

      ## Scores

      | Dimension | Score | Rationale |
      |---|---|---|
      ${TABLE}

      ---
      *Posted by \`benchmark-evaluator\` workflow.*
      EOF
      )

      # Post as PR comment
      gh pr comment "$PR_NUMBER" --body "$COMMENT"
      echo "Posted evaluation to PR #${PR_NUMBER}: total=${TOTAL}/70"
    depends_on: [evaluate]
    timeout: 30000
